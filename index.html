                                                            <input type="radio" name="queueType" value="urgent" checked={selectedQueueType === 'urgent'} onChange={() => { }} style={{ display: 'none' }} />
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: 'clamp(8px, 2vw, 12px)' }}>
                                                                <div style={{ width: 'clamp(36px, 9vw, 44px)', height: 'clamp(36px, 9vw, 44px)', borderRadius: 'clamp(10px, 2.5vw, 12px)', background: 'rgba(192, 57, 43, 0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#ef4444' }}>
                                                                    <IconsNexo.AlertCircle s={20} />
                                                                </div>
                                                                <div>
                                                                    <div style={{ fontWeight: 700, fontSize: 'clamp(12px, 3vw, 14px)', color: '#ef4444' }}>คิวด่วน</div>
                                                                    <div style={{ fontSize: 'clamp(10px, 2.5vw, 11px)', color: 'var(--text-muted-nexo)' }}>ต้องการเร่งด่วน</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Footer Actions */}
                                <div style={{ padding: 'clamp(16px, 4vw, 20px) clamp(16px, 4vw, 24px) clamp(20px, 5vw, 24px)', borderTop: '1px solid var(--border-nexo)' }}>

                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                gap: 8,
                                                background: editingTask ? 'linear-gradient(135deg, #a78bfa 0%, #818cf8 100%)' : 'var(--white-nexo)',
                                                color: editingTask ? '#fff' : 'var(--bg-nexo)'

                                        >
                                            <IconsNexo.Save s={18} />

                                        <button
                                            type="button"
                                            onClick={() => { setShowModal(false); setEditingTask(null); }}
                                            className="btn-ghost-nexo"
                                            style={{
                                                flex: '1 1 100px',
                                                padding: 'clamp(12px, 3vw, 16px)',
                                                fontSize: 'clamp(13px, 3vw, 14px)',
                                                fontWeight: 500
                                            }}
                                        >
                                            ยกเลิก
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* DELETE CONFIRM */}
                    {taskToDelete && (
                        <div className="animate-fadeIn-nexo" style={{ position: 'fixed', inset: 0, zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
                            <div className="modal-overlay-nexo" style={{ position: 'absolute', inset: 0 }}></div>
                            <div className="modal-box-nexo animate-slideUp-nexo" style={{ position: 'relative', zIndex: 1, maxWidth: 300, width: '100%', padding: 28, textAlign: 'center' }}>
                                <div style={{ fontSize: 40, marginBottom: 12 }}>🗑️</div>
                                <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 6, color: 'var(--text-nexo)' }}>ยืนยันการลบ?</div>
                                <div style={{ fontSize: 12, color: 'var(--text-muted-nexo)', marginBottom: 24 }}>ไม่สามารถกู้คืนข้อมูลได้</div>
                                <div style={{ display: 'flex', gap: 10 }}>
                                    <button className="btn-ghost-nexo" style={{ flex: 1, padding: '11px', fontSize: 13 }} onClick={() => setTaskToDelete(null)}>ยกเลิก</button>
                                    <button onClick={executeDelete} style={{ flex: 1, padding: '11px', borderRadius: 12, background: '#1a0a0a', border: '1.5px solid #3a1a1a', color: '#ef4444', cursor: 'pointer', fontSize: 13, fontWeight: 700, fontFamily: 'inherit', transition: 'all 0.2s' }} onMouseEnter={e => { e.currentTarget.style.background = '#2a0a0a'; e.currentTarget.style.borderColor = '#ef4444'; }} onMouseLeave={e => { e.currentTarget.style.background = '#1a0a0a'; e.currentTarget.style.borderColor = '#3a1a1a'; }}>ลบข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BANNER MODAL */}
                    {showBannerModal && (
                        <div className="animate-fadeIn-nexo" style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }} onClick={e => e.target === e.currentTarget && (setShowBannerModal(false), setTempBannerUrl(''))}>
                            <div className="modal-overlay-nexo" style={{ position: 'absolute', inset: 0 }}></div>
                            <form onSubmit={handleBannerSave} className="modal-box-nexo animate-slideUp-nexo" style={{ position: 'relative', zIndex: 1, maxWidth: 360, width: '100%', padding: 24 }}>
                                <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--text-nexo)', marginBottom: 6 }}>เปลี่ยนแบนเนอร์</div>
                                <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)', marginBottom: 16 }}>ใส่ URL เดียวหรือหลาย URL คั่นด้วย <span style={{ fontFamily: 'Space Mono, monospace', color: 'var(--text-soft-nexo)' }}>,</span> เพื่อเปิดสไลด์</div>
                                <div className="input-group-nexo" style={{ marginBottom: 16 }}>
                                    <label className="input-label-nexo">URL รูปภาพ</label>
                                    <textarea
                                        value={tempBannerUrl}
                                        onChange={e => setTempBannerUrl(e.target.value)}
                                        placeholder={'https://example.com/img1.jpg\nหรือ https://img1.jpg,https://img2.jpg'}
                                        style={{ minHeight: 90, resize: 'vertical', fontSize: 12 }}
                                    />
                                </div>
                                <button type="submit" className="btn-primary-nexo" style={{ width: '100%', padding: '12px', fontSize: 13 }}>บันทึก</button>
                                <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} style={{ width: '100%', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', fontSize: 12, marginTop: 12, cursor: 'pointer', fontFamily: 'inherit' }}>ยกเลิก</button>
                            </form>
                        </div>
                    )}

                    {/* IMAGE MODAL */}
                    {showImageModal && (
                        <div className="animate-fadeIn-nexo" style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }} onClick={e => e.target === e.currentTarget && (setShowImageModal(false), setTempImageUrl(''))}>
                            <div className="modal-overlay-nexo" style={{ position: 'absolute', inset: 0 }}></div>
                            <form onSubmit={handleImageSave} className="modal-box-nexo animate-slideUp-nexo" style={{ position: 'relative', zIndex: 1, maxWidth: 340, width: '100%', padding: 24 }}>
                                <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--text-nexo)', marginBottom: 18 }}>เปลี่ยนโลโก้ร้าน</div>
                                <div className="input-group-nexo" style={{ marginBottom: 16 }}>
                                    <label className="input-label-nexo">URL รูปภาพ</label>
                                    <input type="url" value={tempImageUrl} onChange={e => setTempImageUrl(e.target.value)} placeholder="https://..." />
                                </div>
                                <button type="submit" className="btn-primary-nexo" style={{ width: '100%', padding: '12px', fontSize: 13 }}>บันทึก</button>
                                <button type="button" onClick={() => { setShowImageModal(false); setTempImageUrl(''); }} style={{ width: '100%', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', fontSize: 12, marginTop: 12, cursor: 'pointer', fontFamily: 'inherit' }}>ยกเลิก</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const rootNexo = ReactDOM.createRoot(document.getElementById('root-nexo'));
        rootNexo.render(<AppNexo />);
    </script>
</body>

</html>
