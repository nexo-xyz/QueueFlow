                fetchAPINexo({ action: 'changeAdminPassword', currentPassword: changePwCurrent, newPassword: changePwNew })
                    .then(res => {
                        setChangePwLoading(false);
                        if (res.status === 'success') {
                            setChangePwSuccess(true);
                            setChangePwCurrent(''); setChangePwNew(''); setChangePwConfirm('');
                            setTimeout(() => { setChangePwSuccess(false); setShowChangePwModal(false); }, 1800);
                        } else {
                            setChangePwError(res.message || 'รหัสผ่านปัจจุบันไม่ถูกต้อง');
                        }
                    })
                    .catch(() => { setChangePwLoading(false); setChangePwError('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'); });
            };

            const resetThemeToDefault = () => {
                setThemeColors({
                    bg: '#0a0a0a',
                    surface: '#111111',
                    surface2: '#181818',
                    surface3: '#222222',
                    border: '#2a2a2a',
                    border2: '#333333',
                    text: '#f0f0f0',
                    textSoft: '#888888',
                    textMuted: '#555555',
                    accent: '#e8e8e8',
                    white: '#ffffff',
                    urgent: '#c0392b'
                });
                setSelectedThemePreset(null);
            };

            const todayDisplay = new Date().toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const monthTasksCount = tasks.filter(t => t.deadline?.startsWith(todayNexo.slice(0, 7))).length;

            const [selectedQueueType, setSelectedQueueType] = useState('normal');

            const statusOptions = [
                { value: 'notstarted', label: 'ยังไม่ได้เริ่ม', color: '#888', icon: '⚪' },
                { value: 'waiting', label: 'รอคิว', color: '#fbbf24', icon: '🟡' },
                { value: 'todo', label: 'รอดำเนินการ', color: '#3b82f6', icon: '🔵' },
                { value: 'doing', label: 'กำลังทำ', color: '#818cf8', icon: '🟣' },
                { value: 'review', label: 'รอตรวจสอบ', color: '#a78bfa', icon: '🟠' },
                { value: 'fixing', label: 'กำลังแก้ไข', color: '#f87171', icon: '🔴' },
                { value: 'done', label: 'เสร็จแล้ว', color: '#4ade80', icon: '🟢' },
            ];

            const backgroundStyle = getBackgroundStyle();

            return (
                <div style={{ minHeight: '100vh', ...backgroundStyle }} className={bgType === 'color' ? 'grid-bg-nexo' : ''}>
                    <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

                        {/* ── HEADER ─────────────────────────────────────────────────── */}
                        <header style={{ padding: '16px 16px 0', position: 'sticky', top: 0, zIndex: 50, background: 'rgba(10,10,10,0.9)', backdropFilter: 'blur(12px)', borderBottom: '1px solid var(--border-nexo)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingBottom: 14 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                    <div
                                        style={{ width: 36, height: 36, borderRadius: 10, background: 'var(--surface2-nexo)', border: '1px solid var(--border2-nexo)', overflow: 'hidden', cursor: isAdmin ? 'pointer' : 'default', flexShrink: 0 }}
                                        onClick={() => isAdmin && setShowImageModal(true)}
                                    >
                                        {profileImage
                                            ? <img src={profileImage} alt="logo" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                                            : <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>⚙️</div>
                                        }
                                    </div>
                                    <div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                            <span className="mono-nexo shimmer-text-nexo" style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.02em' }}>{appTitle}</span>
                                            <span className="dot-live-nexo"></span>
                                        </div>
                                        <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)', letterSpacing: '0.12em', marginTop: 1 }}>{appSubtitle}</div>
                                    </div>
                                </div>

                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    {isAdmin && (
                                        <>
                                            <button
                                                className="btn-primary-nexo"
                                                style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 13px', fontSize: 12 }}
                                                onClick={() => { setEditingTask(null); setSelectedQueueType('normal'); setShowModal(true); }}
                                            >
                                                <IconsNexo.Plus s={14} /> เพิ่ม Q
                                            </button>
                                            <button
                                                onClick={() => setShowSettingsModal(true)}
                                                style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, borderRadius: 8, background: 'var(--surface2-nexo)', border: '1px solid var(--border2-nexo)', color: 'var(--text-soft-nexo)', cursor: 'pointer', transition: 'all 0.15s' }}
                                                title="ตั้งค่าระบบ"
                                            >
                                                <IconsNexo.Settings s={16} />
                                            </button>
                                        </>
                                    )}
                                    <button
                                        onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)}
                                        style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 12px', borderRadius: 8, background: isAdmin ? 'var(--surface2-nexo)' : 'var(--surface-nexo)', border: `1px solid ${isAdmin ? '#555' : 'var(--border-nexo)'}`, color: isAdmin ? 'var(--text-nexo)' : 'var(--text-soft-nexo)', fontSize: 12, cursor: 'pointer', transition: 'all 0.15s', fontFamily: 'inherit' }}
                                    >
                                        {isAdmin ? <><IconsNexo.LogOut s={14} /> ออก</> : <><IconsNexo.LogIn s={14} /> Admin</>}
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* ── CONTENT ────────────────────────────────────────────────── */}
                        <main style={{ padding: '16px', flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>

                            {/* ANNOUNCEMENT MARQUEE */}
                            {announcementText && (
                                <div style={{
                                    background: 'linear-gradient(135deg, var(--surface2-nexo) 0%, var(--surface3-nexo) 100%)',
                                    border: '1px solid var(--border-nexo)',
                                    borderRadius: 12,
                                    padding: '10px 0',
                                    overflow: 'hidden',
                                    position: 'relative',
                                    boxShadow: '0 2px 8px rgba(0,0,0,0.2)',
                                    marginBottom: 4
                                }}>
                                    <div style={{
                                        position: 'absolute',
                                        left: 0,
                                        top: 0,
                                        bottom: 0,
                                        width: 4,
                                        background: 'linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%)',
                                        borderRadius: '12px 0 0 12px'
                                    }}></div>

                                    <div style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        position: 'absolute',
                                        left: 12,
                                        top: 0,
                                        bottom: 0,
                                        paddingRight: 12,
                                        background: 'linear-gradient(to right, var(--surface2-nexo) 0%, transparent 100%)',
                                        zIndex: 2
                                    }}>
                                        <div style={{
                                            width: 28,
                                            height: 28,
                                            borderRadius: 8,
                                            background: 'rgba(251, 191, 36, 0.15)',
                                            display: 'flex',
                                            alignItems: 'center',
                                            justifyContent: 'center',
                                            color: '#fbbf24',
                                            border: '1px solid rgba(251, 191, 36, 0.3)'
                                        }}>
                                            <IconsNexo.Megaphone s={16} />
                                        </div>
                                    </div>

                                    <div style={{
                                        whiteSpace: 'nowrap',
                                        overflow: 'hidden',
                                        position: 'relative'
                                    }}>
                                        <div className="animate-marquee-nexo" style={{
                                            display: 'inline-block',
                                            paddingLeft: '56px',
                                            fontSize: 13,
                                            color: '#fbbf24',
                                            fontWeight: 600,
                                            letterSpacing: '0.3px',
                                            textShadow: '0 1px 2px rgba(0,0,0,0.3)'
                                        }}>
                                            <span style={{
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: 6
                                            }}>
                                                <span style={{
                                                    width: 4,
                                                    height: 4,
                                                    borderRadius: '50%',
                                                    background: '#fbbf24',
                                                    display: 'inline-block',
                                                    animation: 'pulse-dot-nexo 1.5s ease-in-out infinite'
                                                }}></span>
                                                {announcementText}
                                            </span>
                                            <span style={{ margin: '0 40px', opacity: 0.5 }}>✦</span>
                                            <span style={{
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: 6
                                            }}>
                                                <span style={{
                                                    width: 4,
                                                    height: 4,
                                                    borderRadius: '50%',
                                                    background: '#fbbf24',
                                                    display: 'inline-block',
                                                    animation: 'pulse-dot-nexo 1.5s ease-in-out infinite',
                                                    animationDelay: '0.5s'
                                                }}></span>
                                                {announcementText}
                                            </span>
                                            <span style={{ margin: '0 40px', opacity: 0.5 }}>✦</span>
                                            <span style={{
                                                display: 'inline-flex',
                                                alignItems: 'center',
                                                gap: 6
                                            }}>
                                                <span style={{
                                                    width: 4,
                                                    height: 4,
                                                    borderRadius: '50%',
                                                    background: '#fbbf24',
                                                    display: 'inline-block',
                                                    animation: 'pulse-dot-nexo 1.5s ease-in-out infinite',
                                                    animationDelay: '1s'
                                                }}></span>
                                                {announcementText}
                                            </span>
                                        </div>
                                    </div>

                                    {isAdmin && (
                                        <button
                                            onClick={() => {
                                                setAnnouncementText('');
                                                if (URL_WEB_APP) {
                                                    fetchAPINexo({
                                                        action: 'saveSettings',
                                                        settings: { appTitle, appSubtitle, announcementText: '', selectedFont, themeColors, bgType, bgImageUrl }
                                                    });
                                                }
                                            }}
                                            style={{
                                                position: 'absolute',
                                                right: 8,
                                                top: '50%',
                                                transform: 'translateY(-50%)',
                                                width: 24,
                                                height: 24,
                                                borderRadius: 6,
                                                background: 'rgba(0,0,0,0.3)',
                                                border: '1px solid var(--border-nexo)',
                                                color: 'var(--text-muted-nexo)',
                                                cursor: 'pointer',
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                fontSize: 14,
                                                zIndex: 3,
                                                backdropFilter: 'blur(4px)',
                                                transition: 'all 0.2s'
                                            }}
                                            onMouseEnter={e => {
                                                e.currentTarget.style.background = 'rgba(239, 68, 68, 0.2)';
                                                e.currentTarget.style.color = '#ef4444';
                                                e.currentTarget.style.borderColor = '#ef4444';
                                            }}
                                            onMouseLeave={e => {
                                                e.currentTarget.style.background = 'rgba(0,0,0,0.3)';
                                                e.currentTarget.style.color = 'var(--text-muted-nexo)';
                                                e.currentTarget.style.borderColor = 'var(--border-nexo)';
                                            }}
                                            title="ลบประกาศ"
                                        >
                                            <IconsNexo.X s={14} />
                                        </button>
                                    )}
                                </div>
                            )}

                            {/* TODAY QUEUE STRIP */}
                            {todayTasks.length > 0 && (
                                <div style={{ background: 'var(--surface-nexo)', border: '1px solid var(--border-nexo)', borderRadius: 12, padding: '10px 14px' }}>
                                    <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginBottom: 8, letterSpacing: '0.08em' }}>คิวงานวันนี้ · {todayDisplay}</div>
                                    <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 2 }}>
                                        {[...todayTasks].sort((a, b) => b.id - a.id).map(t => (
                                            <div key={t.id} style={{ flexShrink: 0, background: 'var(--surface2-nexo)', border: `1px solid ${t.status === 'done' ? '#2a4a2a' : (t.status === 'doing' || t.status === 'fixing') ? '#2a2a4a' : 'var(--border-nexo)'}`, borderRadius: 8, padding: '6px 10px', minWidth: 100 }}>
                                                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-nexo)', marginBottom: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 120 }}>{t.client}</div>
                                                <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)' }}>{t.type}</div>
                                                <StatusBadgeNexo status={t.status} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* BANNER */}
                            <div style={{ position: 'relative', borderRadius: 14, overflow: 'hidden', background: 'var(--surface-nexo)', border: '1px solid var(--border-nexo)', minHeight: bannerImage ? 140 : 100, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                <BannerSliderNexo bannerImage={bannerImage} />
                                {bannerImage && <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%)', pointerEvents: 'none' }}></div>}
                                {isAdmin && (
                                    <button
                                        onClick={() => { setTempBannerUrl(bannerImage || ''); setShowBannerModal(true); }}
                                        style={{ position: 'absolute', top: 10, right: 10, padding: '5px 10px', borderRadius: 7, background: 'rgba(0,0,0,0.6)', border: '1px solid rgba(255,255,255,0.15)', color: '#ccc', fontSize: 11, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, backdropFilter: 'blur(4px)', fontFamily: 'inherit', zIndex: 2 }}
                                    >
                                        <IconsNexo.Image s={12} /> เปลี่ยนแบนเนอร์
                                    </button>
                                )}
                            </div>

                            {/* SEARCH + TODAY COUNT */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 10, alignItems: 'center' }}>
                                <div className="search-box-nexo">
                                    <IconsNexo.Search s={15} />
                                    <input
                                        type="text"
                                        placeholder="ค้นหาคิวงาน ชื่อลูกค้า Order ID..."
                                        value={searchQuery}
                                        onChange={e => setSearchQuery(e.target.value)}
                                        style={{ border: 'none', background: 'transparent', padding: '12px 0', flex: 1, fontSize: 13, color: 'var(--text-nexo)' }}
                                    />
                                    {searchQuery && (
                                        <button onClick={() => setSearchQuery('')} style={{ background: 'none', border: 'none', color: 'var(--text-muted-nexo)', cursor: 'pointer', padding: 2 }}><IconsNexo.X s={14} /></button>
                                    )}
                                </div>
                                <div className="today-badge-nexo" style={{ whiteSpace: 'nowrap', textAlign: 'center' }}>
                                    <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--text-nexo)', fontFamily: 'Space Mono, monospace' }}>{todayTasks.length}</div>
                                    <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)' }}>คิววันนี้</div>
                                </div>
                            </div>

                            {/* ── STATS BENTO ─────────────────────────────────────────── */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                <div className="stat-card-nexo">
                                    <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)', letterSpacing: '0.1em', marginBottom: 8 }}>คิวงานเดือนนี้</div>
                                    <div className="mono-nexo" style={{ fontSize: 28, fontWeight: 700, color: 'var(--text-nexo)', lineHeight: 1 }}>{monthTasksCount}</div>
                                    <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginTop: 4 }}>งานทั้งหมด</div>
                                    <div className="progress-bar-nexo" style={{ marginTop: 10 }}>
                                        <div className="progress-fill-nexo" style={{ width: `${Math.min(100, monthTasksCount * 5)}%` }}></div>
                                    </div>
                                </div>

                                <div className="stat-card-nexo">
                                    <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)', letterSpacing: '0.1em', marginBottom: 8 }}>ความคืบหน้าวันนี้</div>
                                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6 }}>
                                        <div className="mono-nexo" style={{ fontSize: 28, fontWeight: 700, color: 'var(--text-nexo)', lineHeight: 1 }}>{progress}</div>
                                        <div style={{ fontSize: 14, color: 'var(--text-muted-nexo)', marginBottom: 3 }}>%</div>
                                    </div>
                                    <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginTop: 4 }}>{doneToday} / {todayTasks.length} งาน</div>
                                    <div className="progress-bar-nexo" style={{ marginTop: 10 }}>
                                        <div className="progress-fill-nexo" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>

                                <div className="stat-card-nexo" style={{ gridColumn: '1 / -1', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div>
                                        <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)', letterSpacing: '0.1em', marginBottom: 4 }}>คิวงานที่รอดำเนินการ</div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                            <div className="mono-nexo" style={{ fontSize: 24, fontWeight: 700, color: 'var(--text-nexo)' }}>{waitingCount}</div>
                                            <div style={{ height: 28, width: 1, background: 'var(--border-nexo)' }}></div>
                                            <div>
                                                <div style={{ fontSize: 10, color: '#818cf8' }}>กำลังทำ: {doingToday}</div>
                                                <div style={{ fontSize: 10, color: '#888', marginTop: 2 }}>รอ: {waitingCount - doingToday}</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)', letterSpacing: '0.08em', marginBottom: 4 }}>คิวถัดไป</div>
                                        <div className="mono-nexo" style={{ fontSize: 16, fontWeight: 700, color: 'var(--text-nexo)' }}>{nextQueueDate.split('-').slice(1).join('/')}</div>
                                        <div style={{ fontSize: 9, color: 'var(--text-muted-nexo)' }}>วันว่าง</div>
                                    </div>
                                </div>
                            </div>

                            {/* ── FILTER TABS ──────────────────────────────────────────── */}
                            <div style={{ display: 'flex', gap: 6, background: 'var(--surface-nexo)', border: '1px solid var(--border-nexo)', borderRadius: 10, padding: 4 }}>
                                {[['all', 'คิวงานทั้งหมด'], ['pending', 'ยังไม่เสร็จ'], ['done', 'เสร็จแล้ว']].map(([val, label]) => (
                                    <button
                                        key={val}
                                        onClick={() => setFilterType(val)}
                                        className={filterType === val ? 'tab-active-nexo' : 'tab-inactive-nexo'}
                                        style={{ flex: 1, padding: '8px 6px', borderRadius: 7, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 700, transition: 'all 0.15s', fontFamily: 'inherit' }}
                                    >
                                        {label}
                                        <span style={{ marginLeft: 4, fontSize: 10, opacity: 0.7 }}>
                                            ({val === 'all' ? tasks.length : val === 'pending' ? tasks.filter(t => t.status !== 'done').length : tasks.filter(t => t.status === 'done').length})
                                        </span>
                                    </button>
                                ))}
                            </div>

                            {/* ── TASK LIST ────────────────────────────────────────────── */}
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                {sortedTasks.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--text-muted-nexo)' }}>
                                        <div style={{ fontSize: 32, marginBottom: 8 }}>📭</div>
                                        <div style={{ fontSize: 13 }}>ไม่พบคิวงาน</div>
                                        {isAdmin && (
                                            <button
                                                onClick={() => { setEditingTask(null); setSelectedQueueType('normal'); setShowModal(true); }}
                                                className="btn-primary-nexo"
                                                style={{ marginTop: 16, padding: '10px 20px', fontSize: 13 }}
                                            >
                                                <IconsNexo.Plus s={14} /> เพิ่มคิวงานแรก
                                            </button>
                                        )}
                                    </div>
                                ) : pagedTasks.map(task => (
                                    <TaskCardNexo
                                        key={task.id}
                                        task={task}
                                        isAdmin={isAdmin}
                                        onEdit={t => { setEditingTask(t); setSelectedQueueType(t.isUrgent ? 'urgent' : 'normal'); setShowModal(true); }}
                                        onToggleStatus={toggleStatus}
                                        onToggleDoing={toggleDoing}
                                    />
                                ))}
                            </div>

                            {/* ── PAGINATION ───────────────────────────────────────────── */}
                            {totalPages > 1 && (
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingBottom: 28, marginTop: 4 }}>
                                    <button
                                        onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                        disabled={currentPage === 1}
                                        style={{ padding: '7px 14px', borderRadius: 8, background: 'var(--surface-nexo)', border: '1px solid var(--border-nexo)', color: currentPage === 1 ? 'var(--text-muted-nexo)' : 'var(--text-nexo)', cursor: currentPage === 1 ? 'default' : 'pointer', fontSize: 12, fontFamily: 'inherit', transition: 'all 0.15s', opacity: currentPage === 1 ? 0.4 : 1 }}
                                    >
                                        ← ก่อนหน้า
                                    </button>

                                    <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                                        {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                                            <button
                                                key={p}
                                                onClick={() => setCurrentPage(p)}
                                                style={{ width: 30, height: 30, borderRadius: 7, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 700, fontFamily: 'Space Mono, monospace', transition: 'all 0.15s', background: p === currentPage ? 'var(--white-nexo)' : 'var(--surface-nexo)', color: p === currentPage ? 'var(--bg-nexo)' : 'var(--text-soft-nexo)', outline: p === currentPage ? 'none' : '1px solid var(--border-nexo)' }}
                                            >
                                                {p}
                                            </button>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                        disabled={currentPage === totalPages}
                                        style={{ padding: '7px 14px', borderRadius: 8, background: 'var(--surface-nexo)', border: '1px solid var(--border-nexo)', color: currentPage === totalPages ? 'var(--text-muted-nexo)' : 'var(--text-nexo)', cursor: currentPage === totalPages ? 'default' : 'pointer', fontSize: 12, fontFamily: 'inherit', transition: 'all 0.15s', opacity: currentPage === totalPages ? 0.4 : 1 }}
                                    >
                                        ถัดไป →
                                    </button>
                                </div>
                            )}
                            {totalPages <= 1 && <div style={{ paddingBottom: 28 }} />}
                        </main>
                    </div>

                    {/* ── MODALS ─────────────────────────────────────────────────────── */}

                    {/* SETTINGS MODAL */}
                    {showSettingsModal && (
                        <div className="animate-fadeIn-nexo" style={{ position: 'fixed', inset: 0, zIndex: 250, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }} onClick={e => e.target === e.currentTarget && setShowSettingsModal(false)}>
                            <div className="modal-overlay-nexo" style={{ position: 'absolute', inset: 0 }}></div>
                            <form onSubmit={handleSettingsSave} className="modal-box-nexo animate-slideUp-nexo" style={{ position: 'relative', zIndex: 1, maxWidth: 600, width: '100%', maxHeight: '90vh', overflow: 'auto', padding: 0 }}>
                                <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border-nexo)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                        <div>
                                            <div style={{ fontWeight: 800, fontSize: 18, color: 'var(--text-nexo)' }}>ตั้งค่าระบบ</div>
                                            <div style={{ fontSize: 12, color: 'var(--text-muted-nexo)', marginTop: 2 }}>ปรับแต่งชื่อแอพ สีธีม และฟอนต์</div>
                                        </div>
                                        <button type="button" onClick={() => setShowSettingsModal(false)} style={{ background: 'var(--surface2-nexo)', border: '1px solid var(--border2-nexo)', borderRadius: 8, padding: 6, cursor: 'pointer', color: 'var(--text-soft-nexo)' }}>
                                            <IconsNexo.X s={18} />
                                        </button>
                                    </div>
                                </div>

                                <div style={{ padding: 24 }}>

                                    {/* Category Management Section */}
                                    <div style={{ marginBottom: 28 }}>
                                        <CategoryManagerNexo
                                            title="ประเภทงาน"
                                            icon={<IconsNexo.Tag s={16} />}
                                            items={taskTypes}
                                            onAdd={handleAddTaskType}
                                            onUpdate={handleUpdateTaskType}
                                            onDelete={handleDeleteTaskType}
                                            placeholder="เพิ่มประเภทงานใหม่..."
                                            colorClass="#a78bfa"
                                        />

                                        <CategoryManagerNexo
                                            title="ช่องทาง"
                                            icon={<IconsNexo.Message s={16} />}
                                            items={channels}
                                            onAdd={handleAddChannel}
                                            onUpdate={handleUpdateChannel}
                                            onDelete={handleDeleteChannel}
                                            placeholder="เพิ่มช่องทางใหม่..."
                                            colorClass="#60a5fa"
                                        />
                                    </div>

                                    {/* Divider */}
                                    <div style={{ height: 1, background: 'var(--border-nexo)', margin: '24px 0' }}></div>

                                    {/* Font Selection */}
                                    <div style={{ marginBottom: 28 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
                                            <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--surface2-nexo)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#a78bfa', border: '1px solid #a78bfa30' }}>
                                                <IconsNexo.Font s={16} />
                                            </div>
                                            <div>
                                                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text-nexo)' }}>เลือกฟอนต์</div>
                                                <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)' }}>เลือกฟอนต์ภาษาไทยที่ต้องการใช้</div>
                                            </div>
                                        </div>
                                        <FontSelectorNexo selectedFont={selectedFont} onSelectFont={setSelectedFont} />
                                    </div>

                                    {/* Divider */}
                                    <div style={{ height: 1, background: 'var(--border-nexo)', margin: '24px 0' }}></div>

                                    {/* Background Type Selection */}
                                    <div style={{ marginBottom: 28 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
                                            <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--surface2-nexo)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fbbf24', border: '1px solid #fbbf2430' }}>
                                                <IconsNexo.Image s={16} />
                                            </div>
                                            <div>
                                                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text-nexo)' }}>ประเภทพื้นหลัง</div>
                                                <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)' }}>เลือกใช้สีพื้นหรือรูปภาพ</div>
                                            </div>
                                        </div>

                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                            <div
                                                className={`bg-type-option-nexo ${bgType === 'color' ? 'selected-nexo' : ''}`}
                                                onClick={() => setBgType('color')}
                                            >
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%' }}>
                                                    <div style={{ width: 40, height: 40, borderRadius: 8, background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                                        <span style={{ fontSize: 18 }}>🎨</span>
                                                    </div>
                                                    <div>
                                                        <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text-nexo)' }}>โค้ดสี</div>
                                                        <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)' }}>ใช้สีพื้นหลัง</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div
                                                className={`bg-type-option-nexo ${bgType === 'image' ? 'selected-nexo' : ''}`}
                                                onClick={() => setBgType('image')}
                                            >
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%' }}>
                                                    <div style={{ width: 40, height: 40, borderRadius: 8, background: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                                        <span style={{ fontSize: 18 }}>🖼️</span>
                                                    </div>
                                                    <div>
                                                        <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text-nexo)' }}>URL รูปภาพ</div>
                                                        <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)' }}>ใช้รูปภาพพื้นหลัง</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {bgType === 'image' && (
                                            <div style={{ marginTop: 16 }}>
                                                <div className="input-group-nexo">
                                                    <label className="input-label-nexo">URL รูปภาพพื้นหลัง</label>
                                                    <div style={{ display: 'flex', gap: 8 }}>
                                                        <input
                                                            type="url"
                                                            value={tempBgImageUrl}
                                                            onChange={e => setTempBgImageUrl(e.target.value)}
                                                            placeholder="https://..."
                                                            style={{ flex: 1 }}
                                                        />
                                                        <button
                                                            type="button"
                                                            onClick={handleBgImageSave}
                                                            className="btn-primary-nexo"
                                                            style={{ padding: '0 16px', fontSize: 12 }}
                                                        >
                                                            ตั้งค่า
                                                        </button>
                                                    </div>
                                                </div>
                                                {bgImageUrl && (
                                                    <div className="bg-preview-nexo" style={{ backgroundImage: `url('${bgImageUrl}')` }}></div>
                                                )}
                                                <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginTop: 8 }}>
                                                    💡 ใส่ URL รูปภาพโดยตรง
                                                </div>
                                            </div>
                                        )}

                                        {bgType === 'color' && (
                                            <div style={{ marginTop: 16 }}>
                                                <div className="color-picker-row-nexo">
                                                    <label>สีพื้นหลัง (BG)</label>
                                                    <input type="color" value={themeColors.bg} onChange={e => { setThemeColors({ ...themeColors, bg: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginTop: 8 }}>
                                                    💡 สีพื้นหลังนี้จะใช้กับทั้งแอพพลิเคชั่น
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* App Info */}
                                    <div style={{ marginBottom: 28 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
                                            <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--surface2-nexo)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#818cf8', border: '1px solid #818cf830' }}>
                                                <IconsNexo.Save s={16} />
                                            </div>
                                            <div>
                                                <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text-nexo)' }}>ข้อมูลแอพพลิเคชั่น</div>
                                                <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)' }}>แก้ไขชื่อที่แสดงบน Header</div>
                                            </div>
                                        </div>

                                        <div className="form-grid-nexo">
                                            <div className="input-group-nexo">
                                                <label className="input-label-nexo">ชื่อแอพ (Title)</label>
                                                <input
                                                    type="text"
                                                    value={appTitle}
                                                    onChange={e => setAppTitle(e.target.value)}
                                                    placeholder="CHECK_Q"
                                                    style={{ fontFamily: 'Space Mono, monospace' }}
                                                />
                                            </div>
                                            <div className="input-group-nexo">
                                                <label className="input-label-nexo">คำบรรยายใต้ชื่อ (Subtitle)</label>
                                                <input
                                                    type="text"
                                                    value={appSubtitle}
                                                    onChange={e => setAppSubtitle(e.target.value)}
                                                    placeholder="QUEUE MANAGEMENT"
                                                />
                                            </div>
                                            <div className="input-group-nexo form-full-width-nexo">
                                                <label className="input-label-nexo">ข้อความประกาศ</label>
                                                <div className="input-with-icon-nexo">
                                                    <span className="input-icon-nexo"><IconsNexo.Megaphone s={16} /></span>
                                                    <input
                                                        type="text"
                                                        value={announcementText}
                                                        onChange={e => setAnnouncementText(e.target.value)}
                                                        placeholder="ข้อความประกาศที่จะแสดงในหน้าแรก"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Theme Colors - แสดงเฉพาะเมื่อเลือกแบบสี */}
                                    {bgType === 'color' && (
                                        <div>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                                    <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--surface2-nexo)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fbbf24', border: '1px solid #fbbf2430' }}>
                                                        <IconsNexo.Image s={16} />
                                                    </div>
                                                    <div>
                                                        <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--text-nexo)' }}>ปรับแต่งสีธีม</div>
                                                        <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)' }}>เลือกธีมสำเร็จรูปหรือปรับแต่งเอง</div>
                                                    </div>
                                                </div>
                                                <button
                                                    type="button"
                                                    onClick={resetThemeToDefault}
                                                    className="btn-ghost-nexo"
                                                    style={{ padding: '6px 12px', fontSize: 11 }}
                                                >
                                                    รีเซ็ตเป็นค่าเริ่มต้น
                                                </button>
                                            </div>

                                            {/* ─── PRESET THEMES GRID ───────────────────────────────────── */}
                                            <div style={{ marginBottom: 24 }}>
                                                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-soft-nexo)', marginBottom: 12, letterSpacing: '0.05em' }}>
                                                    🎨 ธีมสำเร็จรูป (20 ธีมพาสเทล)
                                                </div>
                                                <div style={{
                                                    display: 'grid',
                                                    gridTemplateColumns: 'repeat(auto-fill, minmax(90px, 1fr))',
                                                    gap: 8,
                                                    maxHeight: 200,
                                                    overflowY: 'auto',
                                                    padding: '4px',
                                                    background: 'var(--surface-nexo)',
                                                    borderRadius: 12,
                                                    border: '1px solid var(--border-nexo)'
                                                }}>
                                                    {PASTEL_THEMES.map((theme, idx) => {
                                                        const c = theme.colors;
                                                        return (
                                                            <div
                                                                key={idx}
                                                                onClick={() => applyThemePreset(theme)}
                                                                style={{
                                                                    padding: '8px 6px',
                                                                    borderRadius: 8,
                                                                    background: selectedThemePreset === theme.name ? 'var(--surface3-nexo)' : 'var(--surface2-nexo)',
                                                                    border: selectedThemePreset === theme.name ? '2px solid var(--accent-nexo)' : '1px solid var(--border-nexo)',
                                                                    cursor: 'pointer',
                                                                    transition: 'all 0.15s',
                                                                    textAlign: 'center'
                                                                }}
                                                                onMouseEnter={e => {
                                                                    if (selectedThemePreset !== theme.name) {
                                                                        e.currentTarget.style.background = 'var(--surface3-nexo)';
                                                                        e.currentTarget.style.borderColor = 'var(--border2-nexo)';
                                                                    }
                                                                }}
                                                                onMouseLeave={e => {
                                                                    if (selectedThemePreset !== theme.name) {
                                                                        e.currentTarget.style.background = 'var(--surface2-nexo)';
                                                                        e.currentTarget.style.borderColor = 'var(--border-nexo)';
                                                                    }
                                                                }}
                                                            >
                                                                <div style={{
                                                                    display: 'flex',
                                                                    justifyContent: 'center',
                                                                    gap: 2,
                                                                    marginBottom: 6
                                                                }}>
                                                                    <div style={{ width: 14, height: 14, borderRadius: 4, background: c.accent }} title="Accent"></div>
                                                                    <div style={{ width: 14, height: 14, borderRadius: 4, background: c.surface }} title="Surface"></div>
                                                                    <div style={{ width: 14, height: 14, borderRadius: 4, background: c.urgent }} title="Urgent"></div>
                                                                </div>
                                                                <div style={{
                                                                    fontSize: 10,
                                                                    color: selectedThemePreset === theme.name ? 'var(--accent-nexo)' : 'var(--text-soft-nexo)',
                                                                    fontWeight: selectedThemePreset === theme.name ? 700 : 500,
                                                                    whiteSpace: 'nowrap',
                                                                    overflow: 'hidden',
                                                                    textOverflow: 'ellipsis'
                                                                }}>
                                                                    {theme.name}
                                                                </div>
                                                                {selectedThemePreset === theme.name && (
                                                                    <div style={{ fontSize: 14, marginTop: 2 }}>✨</div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                <div style={{ fontSize: 10, color: 'var(--text-muted-nexo)', marginTop: 8, textAlign: 'center' }}>
                                                    {selectedThemePreset ? `✨ กำลังใช้ธีม "${selectedThemePreset}"` : '💡 คลิกที่ธีมเพื่อเลือกใช้'}
                                                </div>
                                            </div>

                                            {/* Divider */}
                                            <div style={{ height: 1, background: 'var(--border-nexo)', margin: '20px 0' }}></div>

                                            {/* ─── ADVANCED COLOR CUSTOMIZATION ────────────────────────── */}
                                            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-soft-nexo)', marginBottom: 12, letterSpacing: '0.05em' }}>
                                                🔧 ปรับแต่งสีขั้นสูง
                                            </div>

                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px' }}>
                                                <div className="color-picker-row-nexo">
                                                    <label>พื้นหลัง (BG)</label>
                                                    <input type="color" value={themeColors.bg} onChange={e => { setThemeColors({ ...themeColors, bg: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>พื้นผิว (Surface)</label>
                                                    <input type="color" value={themeColors.surface} onChange={e => { setThemeColors({ ...themeColors, surface: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>พื้นผิว 2</label>
                                                    <input type="color" value={themeColors.surface2} onChange={e => { setThemeColors({ ...themeColors, surface2: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>พื้นผิว 3</label>
                                                    <input type="color" value={themeColors.surface3} onChange={e => { setThemeColors({ ...themeColors, surface3: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>ขอบ (Border)</label>
                                                    <input type="color" value={themeColors.border} onChange={e => { setThemeColors({ ...themeColors, border: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>ขอบ 2</label>
                                                    <input type="color" value={themeColors.border2} onChange={e => { setThemeColors({ ...themeColors, border2: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>ข้อความหลัก</label>
                                                    <input type="color" value={themeColors.text} onChange={e => { setThemeColors({ ...themeColors, text: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>ข้อความรอง</label>
                                                    <input type="color" value={themeColors.textSoft} onChange={e => { setThemeColors({ ...themeColors, textSoft: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>ข้อความจาง</label>
                                                    <input type="color" value={themeColors.textMuted} onChange={e => { setThemeColors({ ...themeColors, textMuted: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>สีเน้น (Accent)</label>
                                                    <input type="color" value={themeColors.accent} onChange={e => { setThemeColors({ ...themeColors, accent: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>สีขาว</label>
                                                    <input type="color" value={themeColors.white} onChange={e => { setThemeColors({ ...themeColors, white: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                                <div className="color-picker-row-nexo">
                                                    <label>สีด่วน (Urgent)</label>
                                                    <input type="color" value={themeColors.urgent} onChange={e => { setThemeColors({ ...themeColors, urgent: e.target.value }); setSelectedThemePreset(null); }} />
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div style={{ padding: '16px 24px 24px', borderTop: '1px solid var(--border-nexo)', display: 'flex', flexDirection: 'column', gap: 10 }}>
                                    <button
                                        type="button"
                                        onClick={() => { setShowChangePwModal(true); setChangePwError(''); setChangePwSuccess(false); }}
                                        className="btn-ghost-nexo"
                                        style={{ width: '100%', padding: '12px', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}
                                    >
                                        🔑 เปลี่ยนรหัสผ่าน Admin
                                    </button>
                                    <button type="submit" className="btn-primary-nexo" style={{ width: '100%', padding: '14px', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                                        <IconsNexo.Save s={16} /> บันทึกการตั้งค่า
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* CHANGE PASSWORD MODAL */}
                    {showChangePwModal && (
                        <div className="animate-fadeIn-nexo" style={{ position: 'fixed', inset: 0, zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }} onClick={e => e.target === e.currentTarget && !changePwLoading && (setShowChangePwModal(false), setChangePwCurrent(''), setChangePwNew(''), setChangePwConfirm(''), setChangePwError(''), setChangePwSuccess(false))}>
                            <div className="modal-overlay-nexo" style={{ position: 'absolute', inset: 0 }}></div>
                            <form onSubmit={handleChangePassword} className="modal-box-nexo animate-slideUp-nexo" style={{ position: 'relative', zIndex: 1, width: '100%', maxWidth: 340, padding: 24 }}>
                                <div style={{ marginBottom: 20, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div>
                                        <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--text-nexo)' }}>🔑 เปลี่ยนรหัสผ่าน</div>
                                        <div style={{ fontSize: 11, color: 'var(--text-muted-nexo)', marginTop: 2 }}>ตั้งรหัสผ่านใหม่สำหรับ Admin</div>
                                    </div>
                                    <button type="button" onClick={() => { setShowChangePwModal(false); setChangePwCurrent(''); setChangePwNew(''); setChangePwConfirm(''); setChangePwError(''); setChangePwSuccess(false); }} style={{ background: 'var(--surface2-nexo)', border: '1px solid var(--border2-nexo)', borderRadius: 8, padding: 6, cursor: 'pointer', color: 'var(--text-soft-nexo)' }} disabled={changePwLoading}>
                                        <IconsNexo.X s={15} />
                                    </button>
                                </div>

                                {changePwSuccess ? (
                                    <div style={{ textAlign: 'center', padding: '24px 0' }}>
                                        <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
                                        <div style={{ fontWeight: 700, fontSize: 15, color: '#4ade80' }}>เปลี่ยนรหัสผ่านสำเร็จ</div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="input-group-nexo" style={{ marginBottom: 12 }}>
                                            <label className="input-label-nexo">รหัสผ่านปัจจุบัน</label>
                                            <div style={{ position: 'relative' }}>
                                                <input
                                                    type={showChangePwCurrent ? 'text' : 'password'}
                                                    placeholder="รหัสผ่านปัจจุบัน"
                                                    value={changePwCurrent}
                                                    onChange={e => { setChangePwCurrent(e.target.value); setChangePwError(''); }}
                                                    style={{ paddingRight: 40 }}
                                                    disabled={changePwLoading}
                                                />
                                                <button type="button" onClick={() => setShowChangePwCurrent(!showChangePwCurrent)} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', cursor: 'pointer' }}>
                                                    {showChangePwCurrent ? <IconsNexo.EyeOff s={15} /> : <IconsNexo.Eye s={15} />}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="input-group-nexo" style={{ marginBottom: 12 }}>
                                            <label className="input-label-nexo">รหัสผ่านใหม่</label>
                                            <div style={{ position: 'relative' }}>
                                                <input
                                                    type={showChangePwNew ? 'text' : 'password'}
                                                    placeholder="รหัสผ่านใหม่ (อย่างน้อย 4 ตัว)"
                                                    value={changePwNew}
                                                    onChange={e => { setChangePwNew(e.target.value); setChangePwError(''); }}
                                                    style={{ paddingRight: 40 }}
                                                    disabled={changePwLoading}
                                                />
                                                <button type="button" onClick={() => setShowChangePwNew(!showChangePwNew)} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', cursor: 'pointer' }}>
                                                    {showChangePwNew ? <IconsNexo.EyeOff s={15} /> : <IconsNexo.Eye s={15} />}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="input-group-nexo" style={{ marginBottom: 16 }}>
                                            <label className="input-label-nexo">ยืนยันรหัสผ่านใหม่</label>
                                            <div style={{ position: 'relative' }}>
                                                <input
                                                    type={showChangePwConfirm ? 'text' : 'password'}
                                                    placeholder="ยืนยันรหัสผ่านใหม่"
                                                    value={changePwConfirm}
                                                    onChange={e => { setChangePwConfirm(e.target.value); setChangePwError(''); }}
                                                    style={{ paddingRight: 40, borderColor: changePwError && changePwConfirm && changePwNew !== changePwConfirm ? '#ef4444' : 'var(--border2-nexo)' }}
                                                    disabled={changePwLoading}
                                                />
                                                <button type="button" onClick={() => setShowChangePwConfirm(!showChangePwConfirm)} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', cursor: 'pointer' }}>
                                                    {showChangePwConfirm ? <IconsNexo.EyeOff s={15} /> : <IconsNexo.Eye s={15} />}
                                                </button>
                                            </div>
                                        </div>
                                        {changePwError && <div style={{ fontSize: 11, color: '#ef4444', textAlign: 'center', marginBottom: 12, padding: '8px 12px', background: 'rgba(239,68,68,0.08)', borderRadius: 8, border: '1px solid rgba(239,68,68,0.2)' }}>{changePwError}</div>}

                                        <div style={{ fontWeight: 800, fontSize: 16, color: 'var(--text-nexo)' }}>เข้าสู่ระบบ Admin</div>

                                    </div>
                                    <button type="button" onClick={() => { setShowAuthModal(false); setPassword(''); setAuthError(false); }} style={{ background: 'var(--surface2-nexo)', border: '1px solid var(--border2-nexo)', borderRadius: 8, padding: 6, cursor: 'pointer', color: 'var(--text-soft-nexo)' }}>

                                    </button>
                                </div>
                                <div style={{ position: 'relative', marginBottom: 8 }}>
                                    <input

                                        className={authError ? 'error-nexo' : ''}
                                    />
                                    <button type="button" onClick={() => setShowPw(!showPw)} style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', color: 'var(--text-muted-nexo)', cursor: 'pointer' }}>

                                    </button>
                                </div>
                                {authError && <div style={{ fontSize: 11, color: '#ef4444', textAlign: 'center', marginBottom: 8 }}>รหัสผ่านไม่ถูกต้อง</div>}
                                <button type="submit" className="btn-primary-nexo" style={{ width: '100%', padding: '11px', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 4 }} disabled={isVerifying}>

                            </form>

                    {/* TASK MODAL */}

                                zIndex: 1,
                                width: '100%',
                                maxWidth: 'clamp(320px, 95vw, 600px)',
                                padding: 0,
                                maxHeight: 'clamp(85vh, 90vh, 95vh)',
                                overflow: 'hidden',
                                display: 'flex',

                                                justifyContent: 'center',

                                                border: editingTask ? '1.5px solid #a78bfa30' : '1.5px solid var(--border-nexo)',

                                                </div>
                                                <div>
                                                    <div style={{ fontWeight: 700, fontSize: 'clamp(13px, 3vw, 14px)', color: 'var(--text-nexo)' }}>ข้อมูลลูกค้า</div>

                                                        {channels.map(c => <option key={c} value={c} />)}

                                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 'clamp(14px, 3.5vw, 18px)' }}>

                                                        <input
                                                            list="taskTypesList"
                                                            name="type"
                                                            required
                                                            defaultValue={editingTask?.type || ''}
                                                            placeholder="เลือกหรือพิมพ์ประเภทงาน"
                                                        />
                                                    </div>
                                                    <datalist id="taskTypesList">
                                                        {taskTypes.map(t => <option key={t} value={t} />)}

                                                </div>

                                                <div className="input-group-nexo form-full-width-nexo">

                                                        <textarea
                                                            name="details"
                                                            rows={3}

                                                        />
                                                    </div>

                                                <div style={{ width: 'clamp(28px, 7vw, 32px)', height: 'clamp(28px, 7vw, 32px)', borderRadius: 'clamp(8px, 2vw, 10px)', background: 'var(--surface3-nexo)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#4ade80', border: '1px solid #4ade8030' }}>

                                                        <input

                                                            required
                                                            defaultValue={toDateStrNexo(editingTask?.deadline) || nextQueueDate}

                                                            min="0"
                                                            defaultValue={editingTask?.price || ''}
                                                            placeholder="0.00"
                                                        />
                                                    </div>

                                                                    <IconsNexo.Clock s={20} />
                                                                </div>
                                                                <div>
                                                                    <div style={{ fontWeight: 700, fontSize: 'clamp(12px, 3vw, 14px)', color: 'var(--text-nexo)' }}>คิวปกติ</div>
                                                                    <div style={{ fontSize: 'clamp(10px, 2.5vw, 11px)', color: 'var(--text-muted-nexo)' }}>คิวงานทั่วไป</div>

                                                            </div>
                                                        </div>

                                                            className={`queue-type-card-nexo ${selectedQueueType === 'urgent' ? 'urgent-selected-nexo' : ''}`}
                                                            onClick={() => setSelectedQueueType('urgent')}
